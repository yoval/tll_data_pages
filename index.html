<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="Data Operations Center" content="Tianlala Data Operations Center Documentation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//fastly.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '数据部文档',
      repo: '',
	  search: 'auto', // 启用默认搜索配置
	  search: {
		  maxAge: 86400000, // 设置搜索缓存过期时间为一天
		  placeholder: '搜索',
		  noData: '抱歉，没有找到相关内容',
		  depth: 3 // 搜索深度为二级标题
		},
		count: { //字数统计
		  countable: true,
		  fontsize: '0.9em',
		  color: 'rgb(90,90,90)',
		  language: 'chinese'
		},
	  loadSidebar: true,
	  subMaxLevel: 3,
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//fastly.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- 代码复制 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script> 
  <!-- 翻页功能 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script> 
  <!-- 字数统计 -->
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script> 
</body>
</html>
